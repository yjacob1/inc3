<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 1 – moveFraction Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        h1 {
            margin-bottom: 60px;
            font-size: 1.5em;
            color: #a0a8d8;
        }

        .track {
            width: 600px;
            height: 10px;
            background: #2a2a4e;
            border-radius: 5px;
            position: relative;
            margin-bottom: 40px;
        }

        .fraction {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.6);

            /* animation starts 1 second after CSS loads */
            animation: moveFraction 3s ease-in-out 1s infinite alternate;
        }

        @keyframes moveFraction {
            0% {
                left: 0;
                background: linear-gradient(135deg, #667eea, #764ba2);
                box-shadow: 0 0 20px rgba(102, 126, 234, 0.6);
            }
            100% {
                left: calc(100% - 80px);
                background: linear-gradient(135deg, #f093fb, #f5576c);
                box-shadow: 0 0 20px rgba(245, 87, 108, 0.6);
            }
        }

        p {
            color: #666a8e;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <h1>Challenge 1 – CSS Keyframe Animation</h1>

    <div class="track">
        <div class="fraction">½</div>
    </div>

    <p>Animation: <code>moveFraction</code> — 1s delay, then loops</p>
</body>
</html>
