<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 2 – I ♥ NY T-Shirt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial Black', Arial, sans-serif;
        }

        h1 {
            margin-bottom: 40px;
            color: #333;
            font-size: 1.5em;
        }

        /* T-shirt container */
        .tshirt {
            position: relative;
            width: 300px;
            height: 320px;
        }

        /* T-shirt body (the main torso) */
        .tshirt-body {
            position: absolute;
            bottom: 0;
            left: 30px;
            width: 240px;
            height: 250px;
            background: white;
            border-radius: 0 0 20px 20px;
            z-index: 1;
        }

        /* Left sleeve */
        .tshirt-body::before {
            content: '';
            position: absolute;
            top: 0;
            left: -50px;
            width: 80px;
            height: 90px;
            background: white;
            border-radius: 10px 0 0 30px;
            transform: rotate(-10deg);
            transform-origin: top right;
        }

        /* Right sleeve */
        .tshirt-body::after {
            content: '';
            position: absolute;
            top: 0;
            right: -50px;
            width: 80px;
            height: 90px;
            background: white;
            border-radius: 0 10px 30px 0;
            transform: rotate(10deg);
            transform-origin: top left;
        }

        /* Collar */
        .collar {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 45px;
            background: #f0f0f0;
            border-radius: 0 0 50% 50%;
            z-index: 2;
        }

        /* ── The three absolutely-positioned text elements ── */

        /* Element 1: "I" */
        .letter-i {
            position: absolute;
            top: 130px;
            left: 85px;
            font-size: 3em;
            font-weight: 900;
            color: #111;
            z-index: 3;
        }

        /* Element 2: heart "♥" */
        .heart {
            position: absolute;
            top: 122px;
            left: 130px;
            font-size: 3.2em;
            color: #e00;
            z-index: 4;
        }

        /* Element 3: "NY" */
        .letter-ny {
            position: absolute;
            top: 130px;
            left: 185px;
            font-size: 3em;
            font-weight: 900;
            color: #111;
            z-index: 3;
        }
    </style>
</head>
<body>
    <h1>Challenge 2 – I ♥ NY T-Shirt</h1>

    <div class="tshirt">
        <!-- T-shirt shape -->
        <div class="tshirt-body"></div>
        <div class="collar"></div>

        <!-- Three absolutely-positioned elements -->
        <span class="letter-i">I</span>
        <span class="heart">♥</span>
        <span class="letter-ny">NY</span>
    </div>
</body>
</html>
